<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 870" width="1920" height="870">
  <rect width="1920" height="870" fill="#161410"/>
  <!-- Grid lines -->
  <defs>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="rgba(245,239,224,0.05)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1920" height="870" fill="url(#grid)"/>

  <!-- Simulated green polygons (transformers) -->
  <g opacity="0.35">
    <rect x="200" y="180" width="260" height="160" rx="4" fill="#1D9E75" opacity="0.5"/>
    <rect x="480" y="140" width="190" height="220" rx="4" fill="#1D9E75" opacity="0.4"/>
    <rect x="690" y="200" width="280" height="140" rx="4" fill="#1D9E75" opacity="0.45"/>
    <rect x="990" y="160" width="210" height="200" rx="4" fill="#EF9F27" opacity="0.4"/>
    <rect x="1220" y="180" width="240" height="170" rx="4" fill="#1D9E75" opacity="0.5"/>
    <rect x="300" y="380" width="320" height="200" rx="4" fill="#1D9E75" opacity="0.4"/>
    <rect x="640" y="360" width="250" height="210" rx="4" fill="#D85A30" opacity="0.35"/>
    <rect x="910" y="390" width="280" height="180" rx="4" fill="#1D9E75" opacity="0.45"/>
    <rect x="1210" y="370" width="220" height="200" rx="4" fill="#1D9E75" opacity="0.4"/>
    <rect x="1450" y="200" width="200" height="340" rx="4" fill="#1D9E75" opacity="0.5"/>
  </g>

  <!-- Location marker — predio -->
  <g transform="translate(830, 290)">
    <circle cx="0" cy="0" r="18" fill="rgba(255,60,60,0.25)" stroke="#ff3c3c" stroke-width="2"/>
    <circle cx="0" cy="0" r="7" fill="#ff3c3c"/>
    <line x1="0" y1="-28" x2="0" y2="-18" stroke="#ff3c3c" stroke-width="2"/>
    <circle cx="0" cy="-33" r="4" fill="none" stroke="#ff3c3c" stroke-width="1.5"/>
    <circle cx="0" cy="-33" r="1.5" fill="#ff3c3c"/>
  </g>

  <!-- Center label -->
  <text x="960" y="590" font-family="'JetBrains Mono', monospace" font-size="22" fill="rgba(245,239,224,0.25)" text-anchor="middle" letter-spacing="0.15em">MAPA DE ELECTROHUILA · IMAGEN PENDIENTE</text>
  <text x="960" y="625" font-family="'JetBrains Mono', monospace" font-size="13" fill="rgba(245,239,224,0.15)" text-anchor="middle" letter-spacing="0.1em">Reemplazar con: assets/images/mapa-electrohuila.png</text>

  <!-- Calle 8B label -->
  <text x="855" y="345" font-family="'JetBrains Mono', monospace" font-size="11" fill="rgba(245,239,224,0.5)" text-anchor="start" letter-spacing="0.08em">Calle 8B #38-12 · Neiva</text>

  <!-- Scale bar -->
  <g transform="translate(60, 800)">
    <line x1="0" y1="0" x2="120" y2="0" stroke="rgba(245,239,224,0.3)" stroke-width="1.5"/>
    <line x1="0" y1="-5" x2="0" y2="5" stroke="rgba(245,239,224,0.3)" stroke-width="1.5"/>
    <line x1="120" y1="-5" x2="120" y2="5" stroke="rgba(245,239,224,0.3)" stroke-width="1.5"/>
    <text x="60" y="18" font-family="'JetBrains Mono', monospace" font-size="11" fill="rgba(245,239,224,0.35)" text-anchor="middle">500 m</text>
  </g>

  <!-- Compass -->
  <g transform="translate(1840, 100)">
    <circle cx="0" cy="0" r="28" fill="rgba(14,13,10,0.8)" stroke="rgba(245,239,224,0.15)" stroke-width="1"/>
    <text x="0" y="-12" font-family="'JetBrains Mono', monospace" font-size="13" fill="#ffb547" text-anchor="middle" font-weight="bold">N</text>
    <line x1="0" y1="-6" x2="0" y2="-22" stroke="#ffb547" stroke-width="1.5"/>
    <line x1="0" y1="6" x2="0" y2="22" stroke="rgba(245,239,224,0.3)" stroke-width="1"/>
  </g>
</svg>
